id = "glm-code"
name = "GLM Code"
version = "0.1.0"
schema_version = 1
authors = ["GLM Team"]
description = "GLM Code Agent Server Extension for Zed"
repository = "https://github.com/qazz92/glm-code"

[agent_servers.glm-code]
name = "GLM Code"
icon = "glm-code.svg"

[agent_servers.glm-code.targets.darwin-aarch64]
archive = "https://registry.npmjs.org/@glm-code/glm-code/-/glm-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.glm-code.targets.darwin-x86_64]
archive = "https://registry.npmjs.org/@glm-code/glm-code/-/glm-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.glm-code.targets.linux-x86_64]
archive = "https://registry.npmjs.org/@glm-code/glm-code/-/glm-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.glm-code.targets.windows-x86_64]
archive = "https://registry.npmjs.org/@glm-code/glm-code/-/glm-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

